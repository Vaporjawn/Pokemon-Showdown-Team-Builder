name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  CACHE_KEY_SUFFIX: v1

jobs:
  test:
    name: 🧪 Test & Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'pokemon-team-builder/package-lock.json'

    - name: 📦 Install Dependencies
      working-directory: ./pokemon-team-builder
      run: npm ci

    - name: 🔍 Lint Check
      working-directory: ./pokemon-team-builder
      run: npm run lint:check

    - name: 💅 Format Check
      working-directory: ./pokemon-team-builder
      run: npm run format:check

    - name: 🔧 Type Check
      working-directory: ./pokemon-team-builder
      run: npm run type-check

    - name: 🧪 Unit Tests
      working-directory: ./pokemon-team-builder
      run: npm run test:coverage

    - name: 📊 Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./pokemon-team-builder/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  e2e-test:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'pokemon-team-builder/package-lock.json'

    - name: 📦 Install Dependencies
      working-directory: ./pokemon-team-builder
      run: npm ci

    - name: 🎭 Install Playwright Browsers
      working-directory: ./pokemon-team-builder
      run: npx playwright install --with-deps

    - name: 🔨 Build Application
      working-directory: ./pokemon-team-builder
      run: npm run build

    - name: 🧪 Run Playwright Tests
      working-directory: ./pokemon-team-builder
      run: npm run e2e

    - name: 📤 Upload E2E Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: pokemon-team-builder/playwright-report/
        retention-days: 30

  build:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: [test, e2e-test]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'pokemon-team-builder/package-lock.json'

    - name: 📦 Install Dependencies
      working-directory: ./pokemon-team-builder
      run: npm ci

    - name: 🔨 Build for Production
      working-directory: ./pokemon-team-builder
      run: npm run build
      env:
        NODE_ENV: production

    - name: 📊 Bundle Analysis
      working-directory: ./pokemon-team-builder
      run: npm run build:analyze

    - name: 🚀 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./pokemon-team-builder/dist
        cname: pokemon-hub.dev

    - name: 📤 Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: |
          pokemon-team-builder/dist/
          pokemon-team-builder/coverage/
        retention-days: 7

  lighthouse:
    name: 🏮 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🏮 Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './pokemon-team-builder/.lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🚀 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'pokemon-team-builder/package-lock.json'

    - name: 📦 Install Dependencies
      working-directory: ./pokemon-team-builder
      run: npm ci

    - name: 🔍 Security Audit
      working-directory: ./pokemon-team-builder
      run: npm audit --audit-level moderate

    - name: 🛡️ SAST Scan
      uses: github/super-linter@v5
      env:
        DEFAULT_BRANCH: main
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VALIDATE_TYPESCRIPT_ES: true
        VALIDATE_TYPESCRIPT_STANDARD: false
        VALIDATE_JAVASCRIPT_ES: true
        VALIDATE_HTML: true
        VALIDATE_CSS: true
        VALIDATE_MARKDOWN: true

  dependency-review:
    name: 📋 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 📋 Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        base-ref: ${{ github.event.pull_request.base.sha || 'main' }}
        head-ref: ${{ github.event.pull_request.head.sha || github.ref }}

  performance-budget:
    name: ⚡ Performance Budget Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 📊 Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: ./artifacts

    - name: ⚡ Bundle Size Check
      uses: andresz1/size-limit-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        package_manager: npm
        directory: ./pokemon-team-builder