<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#333" filter="url(#shadow)"/>

  <!-- Top half -->
  <path d="M 50 2 A 48 48 0 0 1 98 50 L 85 50 A 35 35 0 0 0 50 15 A 35 35 0 0 0 15 50 L 2 50 A 48 48 0 0 1 50 2 Z" fill="url(#topGradient)"/>

  <!-- Bottom half -->
  <path d="M 50 98 A 48 48 0 0 1 2 50 L 15 50 A 35 35 0 0 0 50 85 A 35 35 0 0 0 85 50 L 98 50 A 48 48 0 0 1 50 98 Z" fill="url(#bottomGradient)"/>

  <!-- Center band -->
  <rect x="2" y="46" width="96" height="8" fill="#333"/>

  <!-- Center circle outline -->
  <circle cx="50" cy="50" r="15" fill="#333" stroke="#222" stroke-width="2"/>

  <!-- Center circle -->
  <circle cx="50" cy="50" r="12" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- Center button -->
  <circle cx="50" cy="50" r="6" fill="url(#topGradient)"/>

  <!-- Highlight -->
  <ellipse cx="42" cy="35" rx="8" ry="12" fill="rgba(255,255,255,0.3)" transform="rotate(-30 42 35)"/>
</svg>